<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>League Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="container">
    <h1>League Stats</h1>
    <p id="last-updated" class="muted">Last updated: …</p>
  </header>

  <main class="container">
    <section>
      <h2>League Leaders</h2>
      <div id="leaders" class="leaders-grid"></div>
    </section>

    <section style="margin-top: 18px;">
      <h2>Players</h2>
      <input id="player-search" class="search" placeholder="Search player…" />
      <div id="players-table"></div>
    </section>

    <section style="margin-top: 32px;">
      <h2>Teams</h2>
      <div id="teams-table"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
